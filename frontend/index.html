<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nirikshan AI is an advanced intelligent surveillance system providing real-time perimeter protection, crowd tracking, and automated security incident reporting." />
    <title>Nirikshan AI - Intelligent Surveillance Dashboard</title>
    <!-- Plus Jakarta Sans Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" />
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
            },
            colors: {
              primary: {
                DEFAULT: '#00B8D9',
                hover: '#16C7EA',
                dark: '#008AA3',
              },
              soc: {
                bg: '#070B14',
                sidebar: '#0D1321',
                card: '#111827',
                cardElevated: '#182235',
                border: '#273449',
                textPrimary: '#F8FAFC',
                textSecondary: '#CBD5E1',
                textMuted: '#94A3B8',
                success: '#22C55E',
                warning: '#F59E0B',
                danger: '#EF4444',
                info: '#38BDF8',
              }
            }
          }
        }
      }
    </script>
    <style type="text/css">
      /* Ensure absolute override so no other font is used anywhere, excluding Material Symbols */
      *:not(.material-symbols-outlined):not(.material-symbols-outlined *) {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
      }
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined' !important;
      }
      /* Custom scrollbar styling matching dark theme */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #070B14;
      }
      ::-webkit-scrollbar-thumb {
        background: #273449;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00B8D9;
      }
    </style>
  </head>
  <body class="h-full bg-[#070B14] text-[#CBD5E1]">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
