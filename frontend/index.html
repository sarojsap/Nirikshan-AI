<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nirikshan AI is an advanced intelligent surveillance system providing real-time perimeter protection, crowd tracking, and automated security incident reporting." />
    <title>Nirikshan AI - Intelligent Surveillance Dashboard</title>
    <!-- Poppins Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" />
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
            },
            colors: {
              primary: {
                DEFAULT: '#8b5cf6', // Indigo/violet color matching "Add Camera" button
                fixed: '#7c3aed',
              },
            }
          }
        }
      }
    </script>
    <style type="text/css">
      /* Ensure absolute override so no other font is used anywhere, excluding Material Symbols */
      *:not(.material-symbols-outlined):not(.material-symbols-outlined *) {
        font-family: 'Poppins', sans-serif !important;
      }
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined' !important;
      }
      /* Custom scrollbar styling matching dark theme */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #060b13;
      }
      ::-webkit-scrollbar-thumb {
        background: #1b2a47;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2b3e63;
      }
    </style>
  </head>
  <body class="h-full bg-[#060b13] text-[#dae2fd]">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
